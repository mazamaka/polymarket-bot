<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColdMath Weather Bot</title>
    <style>
        /* ── Theme tokens ── */
        :root { --radius:12px; --transition:.2s cubic-bezier(.4,0,.2,1); }
        [data-theme="dark"] {
            --bg:#09090b; --card:#18181b; --card2:#27272a; --bg-hover:#3f3f46;
            --border:#27272a; --border2:#3f3f46;
            --text:#fafafa; --dim:#a1a1aa; --dim2:#71717a;
            --green:#22c55e; --green-bg:rgba(34,197,94,.1); --green-bdr:rgba(34,197,94,.25);
            --red:#ef4444; --red-bg:rgba(239,68,68,.1); --red-bdr:rgba(239,68,68,.25);
            --blue:#3b82f6; --blue-bg:rgba(59,130,246,.1); --blue-bdr:rgba(59,130,246,.25);
            --yellow:#eab308; --yellow-bg:rgba(234,179,8,.1); --yellow-bdr:rgba(234,179,8,.25);
            --purple:#a855f7; --purple-bg:rgba(168,85,247,.1); --purple-bdr:rgba(168,85,247,.25);
            --orange:#f97316; --orange-bg:rgba(249,115,22,.1); --orange-bdr:rgba(249,115,22,.25);
        }
        [data-theme="light"] {
            --bg:#fafafa; --card:#ffffff; --card2:#f4f4f5; --bg-hover:#e4e4e7;
            --border:#e4e4e7; --border2:#d4d4d8;
            --text:#09090b; --dim:#52525b; --dim2:#a1a1aa;
            --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bdr:rgba(22,163,74,.2);
            --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bdr:rgba(220,38,38,.2);
            --blue:#2563eb; --blue-bg:rgba(37,99,235,.08); --blue-bdr:rgba(37,99,235,.2);
            --yellow:#ca8a04; --yellow-bg:rgba(202,138,4,.08); --yellow-bdr:rgba(202,138,4,.2);
            --purple:#9333ea; --purple-bg:rgba(147,51,234,.08); --purple-bdr:rgba(147,51,234,.2);
            --orange:#ea580c; --orange-bg:rgba(234,88,12,.08); --orange-bdr:rgba(234,88,12,.2);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { background:var(--bg); }
        body { font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; -webkit-font-smoothing:antialiased; position:relative; }
        body::before { content:''; position:fixed; inset:0; z-index:-2; background-image:radial-gradient(var(--dot-color) 1px, transparent 1px); background-size:24px 24px; }
        body::after { content:''; position:fixed; inset:0; z-index:-1; background:radial-gradient(ellipse 80% 60% at 50% -10%, var(--glow1), transparent), radial-gradient(ellipse 70% 50% at 80% 110%, var(--glow2), transparent); pointer-events:none; }
        [data-theme="dark"] { --dot-color:rgba(255,255,255,.04); --glow1:rgba(59,130,246,.07); --glow2:rgba(168,85,247,.05); }
        [data-theme="light"] { --dot-color:rgba(0,0,0,.04); --glow1:rgba(59,130,246,.05); --glow2:rgba(168,85,247,.03); }
        .container { max-width:1360px; margin:0 auto; padding:16px 20px; position:relative; z-index:1; }

        .header { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
        .header-left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .logo { font-size:20px; font-weight:800; letter-spacing:-.5px; }
        .logo span { background:linear-gradient(135deg,var(--blue),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .mode-badge { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; padding:4px 12px; border-radius:20px; text-transform:uppercase; letter-spacing:.3px; }
        .mode-live { background:var(--green-bg); color:var(--green); border:1px solid var(--green-bdr); }
        .mode-paper { background:var(--yellow-bg); color:var(--yellow); border:1px solid var(--yellow-bdr); }
        .mode-idle { background:var(--card2); color:var(--dim2); border:1px solid var(--border); }
        .status-info { font-size:12px; color:var(--dim2); display:flex; align-items:center; gap:6px; }
        .pulse-dot { width:6px; height:6px; border-radius:50%; background:currentColor; animation:pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
        .controls { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
        .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border:1px solid var(--border); border-radius:var(--radius); background:var(--card); color:var(--text); cursor:pointer; font-size:13px; font-weight:500; transition:all var(--transition); white-space:nowrap; }
        .btn:hover { border-color:var(--border2); background:var(--card2); }
        .btn:active { transform:scale(.97); }
        .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
        .btn-sm { padding:6px 12px; font-size:12px; }
        .btn-primary { background:var(--blue); border-color:var(--blue); color:#fff; }
        .btn-primary:hover { filter:brightness(1.1); background:var(--blue); }
        .btn-green { background:var(--green); border-color:var(--green); color:#fff; }
        .btn-green:hover { filter:brightness(1.1); }
        .btn-stop { background:var(--red-bg); border-color:var(--red-bdr); color:var(--red); }
        .btn-stop:hover { background:var(--red); color:#fff; }
        .btn-icon { padding:8px; }
        .btn-proxy-ok { border-color:var(--green-bdr); color:var(--green); }
        .btn-proxy-fail { border-color:var(--red-bdr); color:var(--red); background:var(--red-bg); }
        .btn-proxy-checking { border-color:var(--yellow); color:var(--yellow); opacity:.7; }
        .theme-toggle { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:1px solid var(--border); background:var(--card); font-size:16px; transition:all var(--transition); }
        .theme-toggle:hover { border-color:var(--border2); background:var(--card2); }

        .stats { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:20px; }
        .stat { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; transition:all var(--transition); position:relative; overflow:hidden; }
        .stat:hover { border-color:var(--border2); }
        .stat-label { font-size:11px; color:var(--dim2); text-transform:uppercase; letter-spacing:.5px; font-weight:600; margin-bottom:8px; }
        .stat-val { font-size:26px; font-weight:800; letter-spacing:-.5px; line-height:1.1; }
        .stat-sub { font-size:11px; color:var(--dim2); margin-top:6px; font-weight:500; }
        .stat-accent { position:absolute; top:0; left:0; right:0; height:2px; opacity:.6; }
        .green { color:var(--green); } .red { color:var(--red); } .blue { color:var(--blue); } .yellow { color:var(--yellow); }

        .section { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:16px; overflow:hidden; transition:border-color var(--transition); }
        .section:hover { border-color:var(--border2); }
        .sec-head { padding:14px 20px; border-bottom:1px solid var(--border); font-weight:600; font-size:14px; display:flex; justify-content:space-between; align-items:center; }
        .sec-head .count { font-size:11px; color:var(--dim2); font-weight:500; background:var(--card2); padding:2px 10px; border-radius:20px; }

        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        th { text-align:left; padding:10px 20px; font-size:11px; color:var(--dim2); text-transform:uppercase; letter-spacing:.5px; font-weight:600; border-bottom:1px solid var(--border); white-space:nowrap; background:var(--card); position:sticky; top:0; }
        td { padding:12px 20px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:var(--card2); }
        .col-r { text-align:right; }
        .mono { font-family:'SF Mono','JetBrains Mono',monospace; font-size:12px; }

        .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; letter-spacing:.3px; }
        .b-exactly { background:var(--purple-bg); color:var(--purple); border:1px solid var(--purple-bdr); }
        .b-between { background:var(--yellow-bg); color:var(--yellow); border:1px solid var(--yellow-bdr); }
        .b-below { background:var(--blue-bg); color:var(--blue); border:1px solid var(--blue-bdr); }
        .b-above { background:var(--orange-bg); color:var(--orange); border:1px solid var(--orange-bdr); }
        .b-won { background:var(--green-bg); color:var(--green); border:1px solid var(--green-bdr); }
        .b-lost { background:var(--red-bg); color:var(--red); border:1px solid var(--red-bdr); }

        .resolve-tag { font-size:11px; color:var(--dim); }
        .resolve-soon { color:var(--yellow); }
        .resolve-today { color:var(--green); font-weight:600; }

        .empty { padding:32px; text-align:center; color:var(--dim); font-size:13px; }

        .settings-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; padding:18px; }
        .setting-item label { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.3px; display:block; margin-bottom:4px; font-weight:500; }
        .setting-item input, .setting-item select { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); font-size:13px; }
        .setting-item input:focus, .setting-item select:focus { outline:none; border-color:var(--blue); }

        .log { max-height:200px; overflow-y:auto; padding:12px 20px; font-family:'SF Mono','JetBrains Mono','Fira Code',monospace; font-size:11px; line-height:1.9; color:var(--dim2); }
        .log::-webkit-scrollbar { width:4px; } .log::-webkit-scrollbar-track { background:transparent; } .log::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

        @media(max-width:1100px) { .stats { grid-template-columns:repeat(3,1fr); } }
        @media(max-width:768px) { .stats { grid-template-columns:repeat(2,1fr); } .header { gap:12px; } .container { padding:12px; } td,th { padding:10px 14px; } .stat-val { font-size:22px; } }
        @media(max-width:480px) { .stats { grid-template-columns:1fr 1fr; gap:8px; } .stat { padding:12px 14px; } .controls { width:100%; justify-content:space-between; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="logo">ColdMath <span>Weather Bot</span></div>
            <span class="mode-badge mode-idle" id="modeBadge">Idle</span>
            <div class="status-info" id="statusInfo"></div>
        </div>
        <div class="controls">
            <button class="btn" onclick="checkProxy()" id="btnProxy" title="Check Proxy">Proxy: —</button>
            <button class="btn btn-primary" onclick="runScan()">Scan Now</button>
            <button class="btn btn-green" onclick="runRedeem()" id="btnRedeem">Redeem All</button>
            <button class="btn" onclick="toggleBot()" id="btnToggle">Start Bot</button>
            <button class="btn btn-icon btn-sm" onclick="toggleSettings()" title="Settings">&#9881;</button>
            <div class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">&#9790;</div>
        </div>
    </div>

    <div class="stats">
        <div class="stat"><div class="stat-accent" style="background:linear-gradient(90deg,var(--blue),var(--purple))"></div><div class="stat-label">Portfolio</div><div class="stat-val" id="sPortfolio">$0</div><div class="stat-sub" id="sCashSub">—</div></div>
        <div class="stat"><div class="stat-accent" style="background:var(--green)"></div><div class="stat-label">Cash</div><div class="stat-val green" id="sCash">$0</div><div class="stat-sub" id="sPositionsSub">—</div></div>
        <div class="stat"><div class="stat-accent" style="background:linear-gradient(90deg,var(--green),var(--yellow))"></div><div class="stat-label">Total P&L</div><div class="stat-val" id="sPnl">$0</div><div class="stat-sub" id="sWinRate">—</div></div>
        <div class="stat"><div class="stat-accent" style="background:var(--yellow)"></div><div class="stat-label">Win Rate</div><div class="stat-val" id="sWinRateVal">—</div><div class="stat-sub" id="sTradesInfo">—</div></div>
        <div class="stat"><div class="stat-accent" style="background:var(--blue)"></div><div class="stat-label">Signals</div><div class="stat-val blue" id="sSignals">0</div><div class="stat-sub" id="sLastScan">—</div></div>
        <div class="stat"><div class="stat-accent" style="background:var(--green)"></div><div class="stat-label">Avg Edge</div><div class="stat-val green" id="sEdge">—</div><div class="stat-sub" id="sTodayTrades">—</div></div>
    </div>

    <div class="section">
        <div class="sec-head">Activity Log <span class="count" id="logCount">0</span></div>
        <div class="log" id="logBox" style="max-height:180px"></div>
    </div>

    <div class="section" id="settingsPanel" style="display:none">
        <div class="sec-head">Settings</div>
        <div class="settings-grid">
            <div class="setting-item"><label>Trade Size ($)</label><input type="number" id="cfgSize" value="2.0" step="0.5" min="0.5"></div>
            <div class="setting-item"><label>Max Positions</label><input type="number" id="cfgMaxPos" value="10" min="1" max="50"></div>
            <div class="setting-item"><label>Max Exposure ($)</label><input type="number" id="cfgMaxExp" value="50" min="5"></div>
            <div class="setting-item"><label>Max Days Ahead</label><input type="number" id="cfgMaxDays" value="5" min="1" max="16"></div>
            <div class="setting-item"><label>Min NO Price</label><input type="number" id="cfgMinNo" value="0.90" step="0.01" min="0.5" max="0.99"></div>
            <div class="setting-item"><label>Min Ensemble</label><input type="number" id="cfgMinEns" value="10" min="3"></div>
            <div class="setting-item"><label>Scan Interval (min)</label><input type="number" id="cfgInterval" value="30" min="5" max="120"></div>
            <div class="setting-item"><label>Mode</label><select id="cfgMode"><option value="scan">Scan Only</option><option value="paper">Paper</option><option value="live">Live</option></select></div>
        </div>
        <div style="padding:14px 18px;border-top:1px solid var(--border)">
            <label style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;font-weight:500;display:block;margin-bottom:6px">Proxy URL</label>
            <div style="display:flex;gap:8px;align-items:center">
                <input type="text" id="cfgProxy" placeholder="http://user:pass@host:port" style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;font-family:monospace">
                <button class="btn btn-primary" onclick="setProxy()">Apply Proxy</button>
                <button class="btn btn-stop" onclick="removeProxy()" style="font-size:12px">Remove</button>
            </div>
            <div id="proxySetResult" style="font-size:11px;margin-top:6px;color:var(--dim)"></div>
        </div>
        <div style="padding:0 18px 18px;text-align:right"><button class="btn btn-primary" onclick="saveSettings()">Save Settings</button></div>
    </div>

    <div class="section">
        <div class="sec-head">Open Positions <span class="count" id="posCount">0</span></div>
        <div class="table-wrap" id="positionsBody"><div class="empty">No open positions</div></div>
    </div>

    <div class="section">
        <div class="sec-head">Signals <span class="count" id="sigCount">0</span></div>
        <div class="table-wrap" id="signalsBody"><div class="empty">Run a scan to find trading signals</div></div>
    </div>

    <div class="section">
        <div class="sec-head">Trade History <span class="count" id="histCount">0</span></div>
        <div class="table-wrap" id="historyBody"><div class="empty">No completed trades yet</div></div>
    </div>


</div>

<script>
/* All rendering uses textContent and safe DOM APIs - no innerHTML with user data */
/*__WS_CREDS__*/
const API = '';
function $(id) { return document.getElementById(id); }

/* Theme */
function getTheme() { return localStorage.getItem('cm-theme') || 'dark'; }
function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); $('themeBtn').textContent = t === 'dark' ? '\u263E' : '\u2600'; localStorage.setItem('cm-theme', t); }
function toggleTheme() { applyTheme(getTheme() === 'dark' ? 'light' : 'dark'); }
applyTheme(getTheme());

function addLog(msg, cls) {
    const box = $('logBox');
    const div = document.createElement('div');
    if (cls) div.className = cls;
    div.textContent = new Date().toLocaleTimeString() + '  ' + msg;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function pnlClass(v) { return v >= 0 ? 'green' : 'red'; }
function pnlFmt(v) { return (v >= 0 ? '+' : '-') + '$' + Math.abs(v).toFixed(2); }

function makeBadge(text, cls) {
    const s = document.createElement('span');
    s.className = 'badge b-' + cls;
    s.textContent = text;
    return s;
}

function resolveTag(dateStr) {
    const s = document.createElement('span');
    const now = new Date();
    const target = new Date(dateStr + 'T23:59:59Z');
    const days = Math.ceil((target - now) / 86400000);
    s.textContent = dateStr;
    s.className = 'resolve-tag';
    if (days <= 0) { s.className += ' resolve-today'; s.textContent = 'Today'; }
    else if (days === 1) { s.className += ' resolve-soon'; s.textContent = 'Tomorrow'; }
    return s;
}

async function fetchJSON(url, opts) {
    try { const r = await fetch(API + url, opts); return await r.json(); }
    catch(e) { addLog('API error: ' + e.message, 'error'); return null; }
}

function makeTable(headers, rows) {
    const t = document.createElement('table');
    const thead = t.createTHead();
    const hr = thead.insertRow();
    headers.forEach(function(h) {
        const th = document.createElement('th');
        th.textContent = h.label;
        if (h.right) th.className = 'col-r';
        hr.appendChild(th);
    });
    const tbody = t.createTBody();
    rows.forEach(function(cells) {
        const tr = tbody.insertRow();
        cells.forEach(function(cell, i) {
            const td = tr.insertCell();
            if (headers[i] && headers[i].right) td.className = 'col-r';
            if (headers[i] && headers[i].mono) td.classList.add('mono');
            if (cell instanceof HTMLElement) td.appendChild(cell);
            else {
                td.textContent = cell;
                if (typeof cell === 'string' && cell.startsWith('+$')) td.classList.add('green');
                if (typeof cell === 'string' && cell.startsWith('-$')) td.classList.add('red');
            }
        });
    });
    return t;
}

async function refresh() {
    const data = await fetchJSON('/api/status');
    if (!data) return;

    var cash = data.cash_balance || 0;
    var portfolioVal = data.portfolio_value || 0;
    var exposure = data.exposure || 0;
    var totalPortfolio = cash + portfolioVal;
    $('sPortfolio').textContent = '$' + totalPortfolio.toFixed(2);
    $('sCashSub').textContent = '$' + cash.toFixed(2) + ' cash';
    $('sCash').textContent = '$' + cash.toFixed(2);
    $('sPositionsSub').textContent = (data.positions ? data.positions.length : 0) + ' positions open';

    var pnl = data.total_pnl || 0;
    $('sPnl').textContent = pnlFmt(pnl);
    $('sPnl').className = 'stat-val ' + pnlClass(pnl);
    $('sWinRate').textContent = (data.total_trades || 0) + ' trades';

    var wr = data.win_rate || 0;
    $('sWinRateVal').textContent = wr > 0 ? wr.toFixed(0) + '%' : '-';
    $('sWinRateVal').className = 'stat-val ' + (wr >= 80 ? 'green' : wr >= 50 ? 'yellow' : '');
    $('sTradesInfo').textContent = data.total_trades ? (data.total_trades || 0) + ' resolved' : '-';

    $('sSignals').textContent = data.signals_count || 0;
    var ss = data.scan_stats;
    if (ss) {
        var scanInfo = ss.forecasts_ok + '/' + (ss.forecasts_ok + ss.forecasts_failed) + ' forecasts';
        if (ss.forecasts_failed > 0) scanInfo += ' (' + ss.forecasts_failed + ' failed)';
        $('sLastScan').textContent = scanInfo;
        $('sLastScan').className = 'stat-sub' + (ss.status === 'error' ? ' red' : ss.status === 'degraded' ? ' yellow' : '');
    } else {
        $('sLastScan').textContent = data.last_scan ? 'Last: ' + data.last_scan : 'Not scanned';
    }
    $('sEdge').textContent = data.avg_edge ? '+' + (data.avg_edge * 100).toFixed(1) + '%' : '-';
    $('sTodayTrades').textContent = (data.today_trades || 0) + ' today';

    // Mode and status
    var running = data.bot_running || false;
    var mode = data.mode || 'paper';
    var mb = $('modeBadge');
    var si = $('statusInfo');
    si.textContent = '';
    if (running) {
        mb.textContent = mode.toUpperCase();
        mb.className = 'mode-badge mode-' + mode;
        var dot = document.createElement('span');
        dot.className = 'pulse-dot';
        si.appendChild(dot);
        var now = new Date();
        var timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        si.appendChild(document.createTextNode(' Next scan in ' + (data.next_scan_in || '...') + ' (' + timeStr + ')'));
    } else {
        mb.textContent = 'IDLE';
        mb.className = 'mode-badge mode-idle';
    }
    $('btnToggle').textContent = running ? 'Stop Bot' : 'Start Bot';
    $('btnToggle').className = running ? 'btn btn-stop' : 'btn';

    if (data.config) {
        $('cfgSize').value = data.config.trade_size_usd;
        $('cfgMaxPos').value = data.config.max_positions;
        $('cfgMaxExp').value = data.config.max_total_exposure;
        $('cfgMaxDays').value = data.config.max_days_ahead;
        $('cfgMinNo').value = data.config.min_no_price;
        $('cfgMinEns').value = data.config.min_ensemble_members;
        $('cfgInterval').value = data.config.scan_interval_min || 30;
        $('cfgMode').value = data.config.mode || 'paper';
        if (data.config.proxy_url && !$('cfgProxy').value) $('cfgProxy').value = data.config.proxy_url;
    }

    // Positions table
    var pb = $('positionsBody');
    pb.replaceChildren();
    var positions = data.positions || [];
    $('posCount').textContent = positions.length;
    if (!positions.length) { var d = document.createElement('div'); d.className='empty'; d.textContent='No open positions'; pb.appendChild(d); }
    else {
        positions.sort(function(a, b) { return (a.target_date||'9999').localeCompare(b.target_date||'9999'); });
        pb.appendChild(makeTable(
            [{label:'Market'},{label:'Type'},{label:'Price',right:true,mono:true},{label:'Cost',right:true,mono:true},{label:'Value',right:true,mono:true},{label:'P&L',right:true,mono:true},{label:'Resolves',right:true}],
            positions.map(function(p) {
                var entry = (p.entry_price||0)*100;
                var cur = (p.cur_price||p.entry_price||0)*100;
                var pnlVal = p.cash_pnl || 0;
                var pnlPct = p.percent_pnl || 0;
                var curVal = p.current_value || p.size_usd || 0;

                var priceCell = document.createElement('span');
                priceCell.className = 'mono';
                priceCell.textContent = entry.toFixed(0) + '\u00a2 \u2192 ' + cur.toFixed(1) + '\u00a2';

                var valCell = document.createElement('span');
                valCell.className = 'mono';
                valCell.textContent = '$' + curVal.toFixed(2);

                var pnlCell = document.createElement('div');
                var pnlMain = document.createElement('div');
                pnlMain.className = pnlVal >= 0 ? 'green mono' : 'red mono';
                pnlMain.textContent = pnlFmt(pnlVal);
                pnlCell.appendChild(pnlMain);
                if (pnlPct) {
                    var pnlSub = document.createElement('div');
                    pnlSub.style.fontSize = '10px';
                    pnlSub.className = pnlVal >= 0 ? 'green' : 'red';
                    pnlSub.textContent = (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(1) + '%';
                    pnlCell.appendChild(pnlSub);
                }

                var realCost = p.initial_value || p.size_usd || 0;

                return [
                    (p.question||'').substring(0,50),
                    p.direction ? makeBadge(p.direction, p.direction) : '-',
                    priceCell,
                    '$' + realCost.toFixed(2),
                    valCell,
                    pnlCell,
                    resolveTag(p.target_date),
                ];
            })
        ));
    }

    // Signals table
    var sb = $('signalsBody');
    sb.replaceChildren();
    var signals = data.signals || [];
    $('sigCount').textContent = signals.length;
    if (!signals.length) { var d2 = document.createElement('div'); d2.className='empty'; d2.textContent='Run a scan to find trading signals'; sb.appendChild(d2); }
    else {
        sb.appendChild(makeTable(
            [{label:'City'},{label:'Type'},{label:'Threshold',right:true,mono:true},{label:'Model NO',right:true,mono:true},{label:'Market NO',right:true,mono:true},{label:'Edge',right:true,mono:true},{label:'Members',right:true,mono:true},{label:'Date',right:true}],
            signals.map(function(s) { return [
                s.city,
                makeBadge(s.direction, s.direction),
                s.threshold.toFixed(0) + '\u00b0F',
                (s.model_prob_no*100).toFixed(1) + '%',
                (s.market_price_no*100).toFixed(1) + '%',
                '+' + (s.edge*100).toFixed(1) + '%',
                String(s.ensemble_count),
                s.target_date,
            ]; })
        ));
    }

    // History table
    var hb = $('historyBody');
    hb.replaceChildren();
    var history = data.history || [];
    $('histCount').textContent = history.length;
    if (!history.length) { var d3 = document.createElement('div'); d3.className='empty'; d3.textContent='No completed trades yet'; hb.appendChild(d3); }
    else {
        hb.appendChild(makeTable(
            [{label:'Market'},{label:'City'},{label:'Type'},{label:'Result'},{label:'P&L',right:true,mono:true},{label:'Entry',right:true,mono:true},{label:'Date',right:true}],
            history.slice().reverse().slice(0,50).map(function(h) {
                var won = h.status === 'won';
                return [
                    (h.question||'').substring(0,50),
                    h.city||'-',
                    makeBadge(h.direction||'?', h.direction||'exactly'),
                    makeBadge(won?'WON':'LOST', won?'won':'lost'),
                    pnlFmt(h.pnl||0),
                    ((h.entry_price||0)*100).toFixed(1) + '\u00a2',
                    h.target_date||'-',
                ];
            })
        ));
    }

    // Proxy status
    updateProxyBtn(data.proxy_status);

    // Logs rendered by refreshLogs() separately
}

async function runRedeem() {
    addLog('Claiming winnings...', 'info');
    $('btnRedeem').disabled = true;
    $('btnRedeem').textContent = 'Redeeming...';
    var r = await fetchJSON('/api/redeem', {method:'POST'});
    if (r) addLog('Redeem done: ' + r.redeemed + ' positions claimed', r.redeemed > 0 ? 'trade' : 'info');
    $('btnRedeem').disabled = false;
    $('btnRedeem').textContent = 'Redeem All';
    setTimeout(refresh, 1500);
}

async function runScan() {
    var btn = document.querySelector('[onclick="runScan()"]');
    btn.disabled = true;
    btn.textContent = 'Scanning...';
    btn.style.opacity = '0.6';
    addLog('Scanning markets...', 'info');
    var r = await fetchJSON('/api/scan', {method:'POST'});
    if (r) addLog(r.signals_count + ' signals found, ' + r.trades_made + ' trades executed', 'trade');
    btn.disabled = false;
    btn.textContent = 'Scan Now';
    btn.style.opacity = '1';
    setTimeout(refresh, 1000);
}

async function toggleBot() {
    var data = await fetchJSON('/api/status');
    if (data && data.bot_running) { await fetchJSON('/api/stop',{method:'POST'}); addLog('Bot stopped','info'); }
    else { await fetchJSON('/api/start',{method:'POST'}); addLog('Bot started','trade'); }
    setTimeout(refresh, 500);
}

function toggleSettings() {
    var p = $('settingsPanel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

async function saveSettings() {
    var cfg = {
        trade_size_usd: parseFloat($('cfgSize').value),
        max_positions: parseInt($('cfgMaxPos').value),
        max_total_exposure: parseFloat($('cfgMaxExp').value),
        max_days_ahead: parseInt($('cfgMaxDays').value),
        min_no_price: parseFloat($('cfgMinNo').value),
        min_ensemble_members: parseInt($('cfgMinEns').value),
        scan_interval_min: parseInt($('cfgInterval').value),
        mode: $('cfgMode').value,
    };
    var r = await fetchJSON('/api/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg)});
    if (r) addLog('Settings saved', 'info');
    toggleSettings();
}

/* --- Proxy check --- */
function updateProxyBtn(ps) {
    var btn = $('btnProxy');
    if (!ps) { btn.textContent = 'Proxy: —'; btn.className = 'btn'; return; }
    if (ps.ok && ps.can_trade) {
        btn.textContent = ps.ip + ' (' + ps.country + ') ' + ps.latency_ms + 'ms';
        btn.className = 'btn btn-proxy-ok';
        btn.title = ps.city + ', ' + ps.country + ' | CLOB: OK | ' + ps.latency_ms + 'ms';
    } else if (ps.ok) {
        var warn = ps.error || ('Blocked: ' + ps.country);
        btn.textContent = ps.ip + ' (' + ps.country + ') NO TRADE';
        btn.className = 'btn btn-proxy-fail';
        btn.title = warn;
    } else {
        btn.textContent = 'Proxy: FAIL';
        btn.className = 'btn btn-proxy-fail';
        btn.title = ps.error || 'Proxy check failed';
    }
}

async function checkProxy() {
    var btn = $('btnProxy');
    btn.textContent = 'Checking...';
    btn.className = 'btn btn-proxy-checking';
    btn.disabled = true;
    addLog('Checking proxy & direct...', 'info');
    var r = await fetchJSON('/api/proxy-check', {method:'POST'});
    btn.disabled = false;
    if (r) {
        updateProxyBtn(r.proxy || r);
        // Direct connection info
        var d = r.direct;
        if (d) {
            var dMsg = 'Direct: ' + d.ip + ' (' + d.country + ') CLOB=' + (d.clob_reachable ? 'OK' : 'FAIL') + ' ' + d.latency_ms + 'ms';
            addLog(dMsg, d.clob_reachable ? 'info' : 'error');
        }
        // Proxy info
        var p = r.proxy;
        if (p) {
            if (p.ok && p.can_trade) addLog('Proxy: ' + p.ip + ' (' + p.country + ', ' + p.city + ') ' + p.latency_ms + 'ms | CLOB: OK', 'trade');
            else if (p.ok) addLog('Proxy UP but CANNOT trade: ' + p.ip + ' (' + p.country + ') | ' + p.error, 'error');
            else addLog('Proxy FAILED: ' + (p.error || 'unknown'), 'error');
        } else {
            addLog('No proxy configured', 'info');
        }
    } else {
        btn.textContent = 'Proxy: error';
        btn.className = 'btn btn-proxy-fail';
    }
}

async function setProxy() {
    var url = $('cfgProxy').value.trim();
    if (!url) { $('proxySetResult').textContent = 'Enter a proxy URL'; $('proxySetResult').style.color = 'var(--red)'; return; }
    $('proxySetResult').textContent = 'Validating & applying...';
    $('proxySetResult').style.color = 'var(--yellow)';
    var r = await fetchJSON('/api/proxy-set', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({proxy_url: url})});
    if (!r) { $('proxySetResult').textContent = 'API error'; $('proxySetResult').style.color = 'var(--red)'; return; }
    if (r.status === 'ok') {
        $('proxySetResult').style.color = 'var(--green)';
        var ps = r.proxy_status;
        if (ps && ps.can_trade) {
            $('proxySetResult').textContent = 'Applied: ' + ps.ip + ' (' + ps.country + ') | CLOB: OK | ' + ps.latency_ms + 'ms';
        } else if (ps) {
            $('proxySetResult').style.color = 'var(--yellow)';
            $('proxySetResult').textContent = 'Applied but WARNING: ' + (ps.error || 'cannot trade');
        }
        updateProxyBtn(ps);
        addLog('Proxy changed: ' + (ps ? ps.ip + ' (' + ps.country + ')' : url), 'trade');
    } else {
        $('proxySetResult').textContent = 'Failed: ' + (r.error || 'unknown');
        $('proxySetResult').style.color = 'var(--red)';
        addLog('Proxy set failed: ' + (r.error || 'unknown'), 'error');
    }
}

async function removeProxy() {
    $('proxySetResult').textContent = 'Removing...';
    var r = await fetchJSON('/api/proxy-set', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({proxy_url: ''})});
    if (r && r.status === 'ok') {
        $('proxySetResult').textContent = 'Proxy removed (direct connection)';
        $('proxySetResult').style.color = 'var(--dim)';
        $('cfgProxy').value = '';
        updateProxyBtn(null);
        addLog('Proxy removed', 'info');
    }
}

/* --- Log rendering helpers --- */
var _logCount = 0;

function classifyLog(log) {
    var m = log.msg || '';
    if (log.level === 'WARNING') return 'yellow';
    if (log.level === 'ERROR') return 'red';
    if (m.indexOf('BUY') >= 0 || m.indexOf('Traded') >= 0 || m.indexOf('Order posted') >= 0) return 'green';
    if (m.indexOf('redeem') >= 0 && m.indexOf('no redeemable') < 0) return 'green';
    if (m.indexOf('WON') >= 0) return 'green';
    if (m.indexOf('LOST') >= 0) return 'red';
    return '';
}

function isHttpNoise(msg) {
    return msg.indexOf('HTTP Request') >= 0 || msg.indexOf('HTTP/1.1') >= 0;
}

function utcToLocal(utcTime) {
    var parts = utcTime.split(':');
    if (parts.length < 3) return utcTime;
    var now = new Date();
    var d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(),
        parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2])));
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function appendLogEntry(log) {
    var m = log.msg || '';
    if (isHttpNoise(m)) return;
    var lb = $('logBox');
    var div = document.createElement('div');
    var cls = classifyLog(log);
    if (cls) div.className = cls;
    div.textContent = utcToLocal(log.t) + '  ' + m;
    lb.appendChild(div);
    _logCount++;
    $('logCount').textContent = _logCount;
    // Keep max 200 entries in DOM
    while (lb.children.length > 200) { lb.removeChild(lb.firstChild); }
    lb.scrollTop = lb.scrollHeight;
}

/* --- WebSocket for real-time logs --- */
var _wsReconnectDelay = 1000;
var _wsMaxDelay = 15000;
var _ws = null;

function connectLogWs() {
    if (!window._wsUser) {
        // No credentials injected, fallback to polling
        setInterval(fallbackRefreshLogs, 3000);
        return;
    }

    var wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var wsUrl = wsProto + '//' + location.host + '/ws/logs'
        + '?user=' + encodeURIComponent(window._wsUser)
        + '&pass=' + encodeURIComponent(window._wsPass);

    _ws = new WebSocket(wsUrl);

    _ws.onopen = function() {
        _wsReconnectDelay = 1000;
        // Clear existing logs - server sends history on connect
        $('logBox').textContent = '';
        _logCount = 0;
    };

    _ws.onmessage = function(evt) {
        try {
            var log = JSON.parse(evt.data);
            appendLogEntry(log);
        } catch(e) {}
    };

    _ws.onclose = function(evt) {
        _ws = null;
        if (evt.code === 4001) {
            // Auth failed, clear stored creds and fallback
            sessionStorage.removeItem('ws_user');
            sessionStorage.removeItem('ws_pass');
            window._wsUser = '';
            setInterval(fallbackRefreshLogs, 3000);
            return;
        }
        // Auto-reconnect with backoff
        setTimeout(function() {
            _wsReconnectDelay = Math.min(_wsReconnectDelay * 1.5, _wsMaxDelay);
            connectLogWs();
        }, _wsReconnectDelay);
    };

    _ws.onerror = function() {
        if (_ws) _ws.close();
    };
}

async function fallbackRefreshLogs() {
    var data = await fetchJSON('/api/logs');
    if (!data) return;
    var lb = $('logBox');
    var serverLogs = data.logs || [];
    var newCount = serverLogs.length;
    if (newCount === _logCount) return;
    lb.textContent = '';
    _logCount = 0;
    serverLogs.forEach(function(log) { appendLogEntry(log); });
}

refresh();
setInterval(refresh, 30000);
connectLogWs();
</script>
