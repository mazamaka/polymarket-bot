services:
  polymarket-bot:
    build: .
    container_name: polymarket-bot
    restart: unless-stopped
    ports:
      - "8899:8899"
    volumes:
      - polymarket-data:/app/data
      - polymarket-logs:/app/logs
      - polymarket-results:/app/results
      - ${HOME}/.claude/.credentials-server.json:/home/botuser/.claude/.credentials.json
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/api/portfolio"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  polymarket-data:
  polymarket-logs:
  polymarket-results:
